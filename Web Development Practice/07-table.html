<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice level 3</title>
</head>
<body>
    <table border="blue">
        <caption>food menu</caption>
        <thead>
            <tr>
            <th>item</th>
            <th>price</th>
         </tr>
        </thead>
        <tbody>
            <tr>
            <td>frooti</td>
            <td>20</td>
         </tr>
         <tr>
            <td>mango</td>
            <td>40</td>
         </tr>
         <tr>
            <td>samosa</td>
            <td>50</td>
         </tr>

        </tbody>
        

    </table>
    <hr>

    <!--Colspan & Rowspan Attributes-->
    <table border="black">
        <caption>Food Menu</caption>
        <thead>
            <tr>
                <th rowspan="2">Item</th>
                <th colspan="2">Price</th>
            </tr>
            <tr>
                <th>INR</th>
                 <th>USD</th>
            </tr>
        </thead>
        <tbody>

            <tr>
                <td>frooti</td>
                <td>20</td>
                <td>0.20</td>
            </tr>

            <tr>
            <td>mango</td>
            <td>50</td>
            <td>0.50</td>
            </tr>

            <tr>
                 <td>samosa</td>
                <td>40</td>
                <td>0.40</td>
            </tr>

        </tbody>  
    </table>
    <hr>

    <!--Practice Q7.-->

    <table border="black">
        <caption>A test table with merged cells</caption>
        <thead>
            <tr>
                <th rowspan="2"></th>
                 <th colspan="2">Average</th>
                 <th rowspan="2">Red eyes</th>
            </tr>
           
            <tr>
                <th>Height</th>
                <th>Weight</th>
            </tr>
                
            
        </thead>

        <tbody>
            <tr>
                <td>Males</td>
                <td>1.9</td>
                <td>0.003</td>
                <td>40%</td>
            </tr>
            <tr>
                <td>Females</td>
                <td>1.7</td>
                <td>0.002</td>
                <td>43%</td>
            </tr>
        </tbody>
        

    </table>
    <hr>

</body>
</html>
